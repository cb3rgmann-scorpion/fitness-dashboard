<!--
  ============================================================
  CRAIG'S FITNESS DASHBOARD v2 — SETUP GUIDE
  ============================================================

  OPTION 1: Echo Show 5 (Recommended — you already own one)
  ─────────────────────────────────────────────────────────────
  The Echo Show 5 has a built-in Silk browser. Steps:

  1. HOST THIS FILE (pick one):
     a) GitHub Pages (free, easiest):
        - Create a free GitHub account (github.com)
        - Create a new repository (e.g. "fitness-dashboard")
        - Upload this HTML file
        - Go to Settings > Pages > Source: main branch
        - Your URL will be: https://yourusername.github.io/fitness-dashboard/craig_dashboard.html

     b) Any web host (Netlify, Vercel, etc.):
        - Drag and drop this file. Done.

     c) Local network (if you run a home server):
        - Put the file in your web server's public folder
        - Access via local IP: http://192.168.x.x/craig_dashboard.html

  2. ON YOUR ECHO SHOW 5:
     - Say "Alexa, open Silk Browser"
     - Navigate to your hosted URL
     - Tap the three-dot menu > "Add to Home Screen" (or bookmark it)
     - The page auto-updates every 60 seconds with the correct time

  3. KEEPING IT ON SCREEN:
     - In Echo Show settings, turn off the screen saver timeout
       (Settings > Display > Screen Saver > Off)
     - Or say "Alexa, keep the screen on"
     - The Silk browser will stay open showing your dashboard

  INTERACTION:
  - Tap the "Today's Schedule" card to cycle through views:
    Daily → This Week (Sun-Sat) → This Month → back to Daily
  - Tap "Back" button to return to previous view at any time

  OPTION 2: Raspberry Pi + Small Display
  ─────────────────────────────────────────────────────────────
  - Copy this file to the Pi
  - Install Chromium: sudo apt install chromium-browser
  - Run in kiosk mode:
    chromium-browser --kiosk --noerrdialogs --disable-infobars \
      --start-fullscreen file:///home/pi/craig_dashboard.html
  - Add to /etc/xdg/lxsession/LXDE-pi/autostart for boot-on-start

  OPTION 3: Any Phone/Tablet/Computer
  ─────────────────────────────────────────────────────────────
  - Just open the hosted URL in any browser
  - Responsive layout adapts to smaller screens

  HOW TO UPDATE THE DATA:
  ─────────────────────────────────────────────────────────────
  All data is in the JavaScript section below, in clearly labeled blocks.
  Edit the JSON, save, and re-upload. Or ask Claude to regenerate.
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Craig's Fitness Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0b0d14;
    --bg-gradient: linear-gradient(145deg, #0f1219 0%, #0b0d14 50%, #10121c 100%);
    --card: #161923;
    --card-hover: #1c1f2e;
    --card-border: #252838;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3);
    --card-shadow-hover: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.4);
    --text: #eaeaf0;
    --text-dim: #7c7f94;
    --text-muted: #52556a;
    --green: #4ade80;
    --green-bg: rgba(74, 222, 128, 0.12);
    --green-border: rgba(74, 222, 128, 0.25);
    --pink: #f472b6;
    --pink-bg: rgba(244, 114, 182, 0.12);
    --pink-border: rgba(244, 114, 182, 0.25);
    --blue: #60a5fa;
    --blue-bg: rgba(96, 165, 250, 0.12);
    --blue-border: rgba(96, 165, 250, 0.25);
    --orange: #fb923c;
    --orange-bg: rgba(251, 146, 60, 0.12);
    --orange-border: rgba(251, 146, 60, 0.25);
    --purple: #a78bfa;
    --purple-bg: rgba(167, 139, 250, 0.12);
    --purple-border: rgba(167, 139, 250, 0.25);
    --cyan: #22d3ee;
    --cyan-bg: rgba(34, 211, 238, 0.12);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.12);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-gradient);
    color: var(--text);
    width: 960px;
    height: 480px;
    overflow: hidden;
    position: relative;
  }

  /* ── Transitions for view switching ── */
  .view { position: absolute; inset: 0; display: none; flex-direction: column; }
  .view.active { display: flex; }

  /* ══════════════════════════════════════
     DAILY VIEW (default)
     ══════════════════════════════════════ */

  .day-name { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; background: linear-gradient(135deg, #fff 0%, #c8c8d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .date-full { font-size: 12px; color: var(--text-dim); font-weight: 400; }

  .custody-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 16px; border-radius: 20px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.8px;
    backdrop-filter: blur(8px);
  }
  .custody-badge.craig { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .custody-badge.lisa { background: var(--pink-bg); color: var(--pink); border: 1px solid var(--pink-border); }

  .custody-dot { width: 8px; height: 8px; border-radius: 50%; }
  .custody-badge.craig .custody-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .custody-badge.lisa .custody-dot { background: var(--pink); box-shadow: 0 0 8px var(--pink); }

  .time-display { font-size: 28px; color: #fff; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 1px; text-align: center; justify-self: center; }

  /* ── Main Cards Grid ── */
  .main-content { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; padding: 8px 24px 10px; flex: 1; min-height: 0; }

  .card {
    background: linear-gradient(165deg, var(--card) 0%, #12141e 100%);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
    position: relative;
  }
  .card::before {
    content: ''; position: absolute; inset: 0; border-radius: 14px;
    background: linear-gradient(165deg, rgba(255,255,255,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .card.interactive { cursor: pointer; }
  .card.interactive:hover, .card.interactive:active {
    box-shadow: var(--card-shadow-hover);
    border-color: #353850;
  }

  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-shrink: 0; }

  .card-icon {
    font-size: 14px; width: 28px; height: 28px;
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
  }
  .card-icon.workout { background: var(--blue-bg); color: var(--blue); box-shadow: 0 0 12px rgba(96,165,250,0.15); }
  .card-icon.meals { background: var(--green-bg); color: var(--green); box-shadow: 0 0 12px rgba(74,222,128,0.15); }
  .card-icon.schedule { background: var(--purple-bg); color: var(--purple); box-shadow: 0 0 12px rgba(167,139,250,0.15); }

  .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); }
  .card-tap-hint { font-size: 9px; color: var(--text-muted); margin-left: auto; font-weight: 500; letter-spacing: 0.5px; opacity: 0.7; }

  .card-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; z-index: 1; }

  /* Workout styles */
  .workout-type { font-size: 15px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .workout-type.row { color: var(--cyan); }
  .workout-type.gym { color: var(--blue); }
  .workout-type.stretch { color: var(--purple); }
  .workout-type.bodyweight { color: var(--orange); }
  .workout-type.yoga { color: var(--green); }
  .workout-type.outdoor { color: var(--green); }
  .workout-type.rest { color: var(--text-dim); }

  .workout-details { font-size: 13px; color: var(--text-dim); line-height: 1.55; flex: 1; }
  .workout-details .target { color: var(--text); font-weight: 600; font-size: 14px; }
  .workout-details .extra { margin-top: 4px; color: var(--purple); font-weight: 500; }

  .workout-tag {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 4px 12px; border-radius: 6px; margin-top: 8px;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .workout-tag.evening { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }
  .workout-tag.morning { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
  .workout-tag.anytime { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

  .stretch-indicator { display: flex; gap: 6px; margin-top: 8px; align-items: center; justify-content: space-between; }
  .stretch-label { font-size: 12px; color: var(--text-muted); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .stretch-pip { width: 24px; height: 6px; border-radius: 3px; background: var(--card-border); transition: background 0.2s; }
  .stretch-pip.active { background: var(--purple); box-shadow: 0 0 6px rgba(167,139,250,0.4); }

  .tomorrow-strip {
    font-size: 10px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; padding-top: 4px;
  }
  .tomorrow-strip .tmr-label { font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-size: 9px; }

  /* Meal styles */
  .meal-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 5px; }
  .meal-time {
    font-size: 9px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; width: 26px; flex-shrink: 0; padding-top: 2px; letter-spacing: 0.3px;
  }
  .meal-content { flex: 1; }
  .meal-name { font-size: 11.5px; color: var(--text); line-height: 1.35; font-weight: 400; }
  .meal-cal { font-size: 10px; color: var(--text-muted); font-weight: 500; }

  .card-footer {
    margin-top: auto; padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
  }
  .supp-row { display: flex; gap: 5px; flex-wrap: wrap; padding: 2px 0; }
  .supp-pill {
    font-size: 9px; padding: 3px 7px; border-radius: 10px;
    background: rgba(255,255,255,0.04); color: var(--text-dim); font-weight: 600;
  }
  .water-tracker { display: flex; align-items: center; gap: 6px; padding: 6px 0 2px; }
  .water-tracker .water-label { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .water-drops { display: flex; gap: 3px; }
  .water-drop {
    font-size: 14px; cursor: pointer; opacity: 0.25; transition: opacity 0.2s;
    filter: grayscale(1);
  }
  .water-drop.filled { opacity: 1; filter: none; }
  .coffee-icon {
    font-size: 16px; cursor: pointer; opacity: 0.35; transition: opacity 0.2s;
    filter: grayscale(0.6);
  }
  .coffee-icon.filled { opacity: 1; filter: none; }
  .water-count { font-size: 11px; color: var(--cyan); font-weight: 700; margin-left: auto; }

  /* Schedule styles */
  .sched-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 7px; }
  .sched-time { font-size: 10px; font-weight: 700; color: var(--text-dim); width: 32px; flex-shrink: 0; padding-top: 2px; font-variant-numeric: tabular-nums; text-align: right; }
  .sched-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .sched-text { font-size: 11.5px; line-height: 1.4; }
  .sched-sub { font-size: 10px; color: var(--text-muted); }
  .sched-optional { font-size: 10px; color: var(--cyan); padding: 4px 0 2px; border-top: 1px dashed rgba(255,255,255,0.06); margin-top: 4px; }
  .sched-alt { font-size: 10px; color: var(--purple); padding: 2px 0; }
  .options-divider { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; padding: 6px 0 2px; text-transform: uppercase; opacity: 0.6; }

  /* ── Bottom Bar ── */
  .bottom-bar {
    display: flex; align-items: center;
    padding: 4px 24px 8px; flex-shrink: 0;
  }
  .pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-dim); font-weight: 500;
    background: rgba(255,255,255,0.03); padding: 7px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.04); white-space: nowrap;
  }
  .pill-val { font-weight: 700; }
  .pill-val.cyan { color: var(--cyan); }
  .pill-val.purple { color: var(--purple); }
  .pill-val.red { color: var(--red); }
  .week-badge { margin-left: auto; font-size: 10.5px; color: var(--text-muted); font-weight: 500; }
  .week-badge span { color: var(--purple); font-weight: 800; }
  .custody-strip { display: flex; gap: 3px; align-items: center; }
  .cs-box {
    width: 18px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center;
    font-size: 7px; font-weight: 800; letter-spacing: 0.3px; opacity: 0.6;
  }
  .cs-box.cs-craig { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .cs-box.cs-lisa { background: var(--pink-bg); color: var(--pink); border: 1px solid var(--pink-border); }
  .cs-box.cs-unknown { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.08); }
  .cs-box.cs-today { opacity: 1; box-shadow: 0 0 6px rgba(167,139,250,0.4); border-color: var(--purple); }
  .cs-box.cs-holiday { border-bottom: 3px solid var(--red); }
  .cs-box.cs-noschool { border-bottom: 3px solid var(--cyan); }
  .cs-dow { font-size: 7px; color: var(--text-dim); text-align: center; white-space: nowrap; }

  /* ══════════════════════════════════════
     WEEK VIEW (overlay)
     ══════════════════════════════════════ */
  .overlay-header {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 12px 24px 8px; flex-shrink: 0;
  }
  .overlay-title { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; background: linear-gradient(135deg, #fff 0%, #c8c8d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .overlay-subtitle { font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: 12px; }

  .nav-btns { display: flex; gap: 8px; justify-self: end; }
  .nav-btn {
    background: var(--card); border: 1px solid var(--card-border);
    color: var(--text-dim); font-size: 11px; font-weight: 600;
    padding: 6px 16px; border-radius: 8px; cursor: pointer;
    transition: all 0.15s ease; font-family: inherit; letter-spacing: 0.3px;
  }
  .nav-btn:hover { background: var(--card-hover); color: var(--text); border-color: #404360; }
  .nav-btn.active { background: var(--purple-bg); color: var(--purple); border-color: var(--purple-border); }
  .nav-btn.refresh { padding: 6px 10px; font-size: 13px; }
  .nav-btn.refresh.spinning { animation: spin 0.6s ease; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Week grid — 2 rows: 4 + 3 */
  .week-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    padding: 2px 16px 8px; flex: 1; min-height: 0;
  }
  .week-day {
    background: linear-gradient(165deg, var(--card) 0%, #12141e 100%);
    border: 1px solid var(--card-border); border-radius: 10px;
    padding: 8px 8px 6px; display: flex; flex-direction: column;
    box-shadow: var(--card-shadow); overflow: hidden; position: relative;
  }
  .week-day::before {
    content: ''; position: absolute; inset: 0; border-radius: 12px;
    background: linear-gradient(165deg, rgba(255,255,255,0.025) 0%, transparent 50%);
    pointer-events: none;
  }
  .week-day.today { border-color: var(--purple-border); box-shadow: 0 0 20px rgba(167,139,250,0.15), var(--card-shadow); }
  .week-day.craig-day { border: 1px solid var(--green); }
  .week-day.lisa-day { border: 1px solid var(--pink); }

  .wd-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .wd-dayname { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
  .wd-date { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; }
  .week-day.today .wd-date { color: var(--purple); }

  .wd-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; margin-bottom: 4px;
  }
  .wd-badge.craig { background: var(--green-bg); color: var(--green); }
  .wd-badge.lisa { background: var(--pink-bg); color: var(--pink); }

  .wd-event { font-size: 11px; color: var(--purple); font-weight: 600; margin-bottom: 4px; line-height: 1.3; }

  .wd-progress { display: flex; align-items: center; gap: 5px; margin-top: 6px; }
  .wd-progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .wd-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .wd-progress-text { font-size: 11px; color: var(--text-muted); font-weight: 700; white-space: nowrap; }

  .wd-remaining { font-size: 11px; color: var(--text-dim); line-height: 1.6; flex: 1; }
  .wd-remain-item { display: inline; }
  .wd-remain-item::after { content: ' · '; opacity: 0.4; }
  .wd-remain-item:last-child::after { content: ''; }
  .wd-done-list { font-size: 11px; color: var(--green); line-height: 1.6; margin-top: 5px; padding-top: 5px; border-top: 1px dashed rgba(255,255,255,0.06); opacity: 0.85; }
  .wd-done-item { display: inline; }
  .wd-done-item::after { content: ' · '; color: var(--text-muted); }
  .wd-done-item:last-child::after { content: ''; }
  .wd-section-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }

  .week-summary {
    background: linear-gradient(165deg, var(--card) 0%, #12141e 100%);
    border: 1px solid var(--card-border); border-radius: 10px;
    padding: 10px 10px 8px; display: flex; flex-direction: column;
    box-shadow: var(--card-shadow); position: relative;
  }
  .ws-title { font-size: 13px; font-weight: 700; color: var(--purple); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .ws-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .ws-label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
  .ws-value { font-size: 13px; font-weight: 800; }
  .ws-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; margin: 0 10px; overflow: hidden; }
  .ws-bar-fill { height: 100%; border-radius: 2px; }

  /* ══════════════════════════════════════
     MONTH VIEW (overlay)
     ══════════════════════════════════════ */
  .month-grid-wrap { padding: 0 16px 4px; flex: 1; min-height: 0; display: flex; flex-direction: column; }

  .month-dow-row {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    margin-bottom: 3px;
  }
  .month-dow {
    text-align: center; font-size: 10px; font-weight: 700;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
    padding: 2px 0;
  }

  .month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    flex: 1; min-height: 0;
  }
  .month-cell {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 6px; padding: 3px 5px; display: flex; flex-direction: column;
    overflow: hidden; min-height: 0; position: relative; cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .month-cell:hover { border-color: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,0.15); }
  .month-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .month-cell.empty:hover { border-color: transparent; box-shadow: none; }
  .month-cell.today { border-color: var(--purple); box-shadow: 0 0 12px rgba(167,139,250,0.25); }
  .month-cell.craig { background: rgba(74,222,128,0.06); border-color: rgba(74,222,128,0.15); }
  .month-cell.lisa { background: rgba(244,114,182,0.06); border-color: rgba(244,114,182,0.15); }

  .mc-top { display: flex; justify-content: space-between; align-items: center; }
  .mc-date { font-size: 12px; font-weight: 700; }
  .month-cell.today .mc-date { color: var(--purple); }
  .month-cell.craig .mc-date { color: var(--green); }
  .month-cell.lisa .mc-date { color: var(--pink); }
  .mc-badge { font-size: 7px; font-weight: 800; padding: 1px 4px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .mc-badge.craig { background: var(--green-bg); color: var(--green); }
  .mc-badge.lisa { background: var(--pink-bg); color: var(--pink); }

  .mc-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 1px; min-height: 0; }
  .mc-workout { font-size: 9px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .mc-event { font-size: 8px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mc-stretch { font-size: 7px; color: var(--purple); font-weight: 600; }

  .mc-progress { display: flex; align-items: center; gap: 3px; margin-top: auto; }

<!-- ════════════════════════════════════════════
     DATA CONFIGURATION
     ════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

// ──────────────────────────────────────────────
// SUPABASE CLIENT
// ──────────────────────────────────────────────
const SUPABASE_URL = 'https://mthfgzeuncpytlkhveol.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yIow2FJ2IuWWqTcPXE0Gfg_9Zt2vLA4';
let sb = null; // initialized in DOMContentLoaded
let sbReady = false;

// In-memory cache — populated from Supabase on load, falls back to localStorage
const DB_CACHE = {
  daily: {},      // dateStr -> {mood, energy, sleep, weight, water, coffee, notes}
  checkboxes: {}, // dateStr -> {key: true, ...}
  ratings: {},    // dateStr -> {exerciseKey: rating, ...}
};

function initSupabase() {
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    sbReady = true;
    console.log('Supabase connected');
  } catch(e) {
    console.warn('Supabase init failed, using localStorage only', e);
    sbReady = false;
  }
}

// ── Auth ──
async function checkAuth() {
  if (!sbReady) return false;
  try {
    const { data: { session } } = await sb.auth.getSession();
    return !!session;
  } catch(e) { return false; }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Enter email and password'; return; }
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { errEl.textContent = error.message; return; }
    document.getElementById('login-screen').classList.add('hidden');
    await startDashboard();
  } catch(e) { errEl.textContent = 'Connection error'; }
}

async function doLogout() {
  if (sbReady) await sb.auth.signOut();
  document.getElementById('login-screen').classList.remove('hidden');
}

async function startDashboard() {
  await migrateLocalStorage();
  await refreshData();
}

// Load all schedule data from Supabase (replaces CSV loading)
async function loadScheduleFromDB() {
  if (!sbReady) return false;
  try {
    const { data, error } = await sb.from('schedule').select('*');
    if (error) throw error;
    CUSTODY_CALENDAR = {};
    CSV_EVENTS = {};
    CSV_NOTES = {};
    data.forEach(row => {
      if (row.custody) CUSTODY_CALENDAR[row.date] = row.custody.toUpperCase();
      if (row.event) CSV_EVENTS[row.date] = row.event;
      if (row.notes) CSV_NOTES[row.date] = row.notes;
    });
    console.log('Schedule loaded from Supabase: ' + data.length + ' days');
    return true;
  } catch(e) {
    console.warn('Supabase schedule load failed', e);
    return false;
  }
}

// Load tracking data for a date range from Supabase into cache
async function loadTrackingData(startDate, endDate) {
  if (!sbReady) return;
  try {
    // Load daily_log
    const { data: daily } = await sb.from('daily_log').select('*')
      .gte('date', startDate).lte('date', endDate);
    if (daily) daily.forEach(row => {
      DB_CACHE.daily[row.date] = {
        mood: row.mood || 0, energy: row.energy || 0,
        sleep: parseFloat(row.sleep) || 0, weight: parseFloat(row.weight) || 0,
        water: row.water || 0, coffee: row.coffee || 0, notes: row.notes || ''
      };
    });
    // Load checkboxes
    const { data: cbs } = await sb.from('checkboxes').select('*')
      .gte('date', startDate).lte('date', endDate);
    if (cbs) cbs.forEach(row => {
      if (!DB_CACHE.checkboxes[row.date]) DB_CACHE.checkboxes[row.date] = {};
      DB_CACHE.checkboxes[row.date][row.item_key] = true;
    });
    // Load ratings
    const { data: rats } = await sb.from('exercise_ratings').select('*')
      .gte('date', startDate).lte('date', endDate);
    if (rats) rats.forEach(row => {
      if (!DB_CACHE.ratings[row.date]) DB_CACHE.ratings[row.date] = {};
      DB_CACHE.ratings[row.date][row.exercise_key] = row.rating;
    });
    console.log('Tracking data loaded for ' + startDate + ' to ' + endDate);
  } catch(e) {
    console.warn('Supabase tracking load failed', e);
  }
}

// Upsert a daily_log field to Supabase (fire-and-forget)
function dbSaveDaily(dateStr, field, value) {
  // Update cache
  if (!DB_CACHE.daily[dateStr]) DB_CACHE.daily[dateStr] = {mood:0,energy:0,sleep:0,weight:0,water:0,coffee:0,notes:''};
  DB_CACHE.daily[dateStr][field] = value;
  // Also save to localStorage as backup
  localStorage.setItem(field + '_' + dateStr, value);
  // Write to Supabase
  if (!sbReady) return;
  const row = { date: dateStr, [field]: value };
  sb.from('daily_log').upsert(row, { onConflict: 'date' }).then(({error}) => {
    if (error) console.warn('DB save error:', error);
  });
}

// Save checkbox to Supabase
function dbSaveCheckbox(dateStr, key, checked) {
  // Update cache
  if (!DB_CACHE.checkboxes[dateStr]) DB_CACHE.checkboxes[dateStr] = {};
  if (checked) DB_CACHE.checkboxes[dateStr][key] = true;
  else delete DB_CACHE.checkboxes[dateStr][key];
  // localStorage backup
  localStorage.setItem('cb_' + dateStr, JSON.stringify(DB_CACHE.checkboxes[dateStr]));
  // Supabase
  if (!sbReady) return;
  if (checked) {
    sb.from('checkboxes').upsert({ date: dateStr, item_key: key }, { onConflict: 'date,item_key' })
      .then(({error}) => { if (error) console.warn('DB cb save error:', error); });
  } else {
    sb.from('checkboxes').delete().eq('date', dateStr).eq('item_key', key)
      .then(({error}) => { if (error) console.warn('DB cb delete error:', error); });
  }
}

// Save exercise rating to Supabase
function dbSaveRating(dateStr, exerciseKey, rating) {
  // Update cache
  if (!DB_CACHE.ratings[dateStr]) DB_CACHE.ratings[dateStr] = {};
  if (rating === undefined) delete DB_CACHE.ratings[dateStr][exerciseKey];
  else DB_CACHE.ratings[dateStr][exerciseKey] = rating;
  // localStorage backup
  localStorage.setItem('ratings_' + dateStr, JSON.stringify(DB_CACHE.ratings[dateStr] || {}));
  // Supabase
  if (!sbReady) return;
  if (rating === undefined) {
    sb.from('exercise_ratings').delete().eq('date', dateStr).eq('exercise_key', exerciseKey)
      .then(({error}) => { if (error) console.warn('DB rating delete error:', error); });
  } else {
    sb.from('exercise_ratings').upsert({ date: dateStr, exercise_key: exerciseKey, rating: rating },
      { onConflict: 'date,exercise_key' })
      .then(({error}) => { if (error) console.warn('DB rating save error:', error); });
  }
}

// Migrate localStorage data to Supabase (runs once on first connect)
async function migrateLocalStorage() {
  if (!sbReady) return;
  const migrated = localStorage.getItem('_sb_migrated');
  if (migrated) return;
  console.log('Migrating localStorage to Supabase...');
  const dailyRows = {};
  const cbInserts = [];
  const ratingInserts = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    const v = localStorage.getItem(k);
    // Daily fields: mood_DATE, energy_DATE, sleep_DATE, weight_DATE, water_DATE, coffee_DATE, notes_DATE
    const dailyMatch = k.match(/^(mood|energy|sleep|weight|water|coffee|notes)_(\d{4}-\d{2}-\d{2})$/);
    if (dailyMatch) {
      const [, field, dateStr] = dailyMatch;
      if (!dailyRows[dateStr]) dailyRows[dateStr] = { date: dateStr };
      dailyRows[dateStr][field] = field === 'notes' ? v : parseFloat(v) || 0;
      continue;
    }
    // Checkboxes: cb_DATE
    const cbMatch = k.match(/^cb_(\d{4}-\d{2}-\d{2})$/);
    if (cbMatch) {
      try {
        const data = JSON.parse(v);
        Object.keys(data).forEach(key => {
          if (data[key]) cbInserts.push({ date: cbMatch[1], item_key: key });
        });
      } catch(e) {}
      continue;
    }
    // Ratings: ratings_DATE
    const ratMatch = k.match(/^ratings_(\d{4}-\d{2}-\d{2})$/);
    if (ratMatch) {
      try {
        const data = JSON.parse(v);
        Object.keys(data).forEach(key => {
          ratingInserts.push({ date: ratMatch[1], exercise_key: key, rating: data[key] });
        });
      } catch(e) {}
    }
  }
  // Batch upsert
  const dailyArr = Object.values(dailyRows);
  if (dailyArr.length > 0) {
    const { error } = await sb.from('daily_log').upsert(dailyArr, { onConflict: 'date', ignoreDuplicates: false });
    if (error) console.warn('Migration daily_log error:', error);
    else console.log('Migrated ' + dailyArr.length + ' daily_log rows');
  }
  if (cbInserts.length > 0) {
    const { error } = await sb.from('checkboxes').upsert(cbInserts, { onConflict: 'date,item_key' });
    if (error) console.warn('Migration checkboxes error:', error);
    else console.log('Migrated ' + cbInserts.length + ' checkbox rows');
  }
  if (ratingInserts.length > 0) {
    const { error } = await sb.from('exercise_ratings').upsert(ratingInserts, { onConflict: 'date,exercise_key' });
    if (error) console.warn('Migration ratings error:', error);
    else console.log('Migrated ' + ratingInserts.length + ' rating rows');
  }
  localStorage.setItem('_sb_migrated', '1');
  console.log('localStorage migration complete');
}

async function loadScheduleCSV() {
  try {
    // Clear old data so edits are picked up cleanly
    CUSTODY_CALENDAR = {};
    CSV_EVENTS = {};
    CSV_NOTES = {};
    const resp = await fetch('craig_schedule.csv?t=' + Date.now());
    const text = await resp.text();
    const lines = text.trim().split('\n');
    // Skip header row
    for (let i = 1; i < lines.length; i++) {
      // Parse CSV (handles quoted fields with commas)
      const row = [];
      let field = '', inQuote = false;
      for (let c = 0; c < lines[i].length; c++) {
        const ch = lines[i][c];
        if (ch === '"') { inQuote = !inQuote; }
        else if (ch === ',' && !inQuote) { row.push(field.trim()); field = ''; }
        else { field += ch; }
      }
      row.push(field.trim());

      const [dateStr, custody, event, notes] = row;
      if (!dateStr || !dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) continue;
      if (custody) CUSTODY_CALENDAR[dateStr] = custody.toUpperCase();
      if (event) CSV_EVENTS[dateStr] = event;
      if (notes) CSV_NOTES[dateStr] = notes;
    }
    console.log('Schedule loaded: ' + Object.keys(CUSTODY_CALENDAR).length + ' days');
  } catch(e) {
    console.warn('Could not load craig_schedule.csv, using defaults', e);
  }
}

function getMeals(dateStr, isKid) {
  const d = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay();
  const dinner = isKid ? DINNERS.kid[dow] : DINNERS.craig[dow];
  const snack = SNACKS[dow];
  // Yesterday's dinner = today's lunch
  const yd = new Date(d); yd.setDate(yd.getDate()-1);
  const ydow = yd.getDay();
  const yesterdayDinner = isKid ? DINNERS.kid[ydow] : DINNERS.craig[ydow];
  return [
    { time: "AM", name: "Black coffee", cal: "~0" },
    { time: "12P", name: "Leftovers: " + yesterdayDinner.name.split(' — ')[0].split(' (')[0], cal: yesterdayDinner.cal },
    { time: "3P", name: snack.name, cal: snack.cal },
    { time: "6P", name: dinner.name, cal: dinner.cal },
    { time: "9P", name: "Light snack — herbal tea + fruit or toast", cal: "~150" },
  ];
}

// ──────────────────────────────────────────────
// DATA PERSISTENCE — Supabase + localStorage cache
// All reads from in-memory cache (instant).
// All writes go to cache + Supabase (async).
// Falls back to localStorage if Supabase unavailable.
// ──────────────────────────────────────────────
function _getDailyField(dateStr, field) {
  if (DB_CACHE.daily[dateStr]) return DB_CACHE.daily[dateStr][field] || 0;
  // Fallback to localStorage
  try {
    const v = localStorage.getItem(field + '_' + dateStr);
    return v !== null ? (field === 'notes' ? v : parseFloat(v) || 0) : 0;
  } catch(e) { return 0; }
}

function getChecked(dateStr) {
  if (DB_CACHE.checkboxes[dateStr]) return { ...DB_CACHE.checkboxes[dateStr] };
  try { return JSON.parse(localStorage.getItem('cb_' + dateStr)) || {}; } catch(e) { return {}; }
}
function setChecked(dateStr, key, val) {
  dbSaveCheckbox(dateStr, key, val);
}
function getNotes(dateStr) {
  if (DB_CACHE.daily[dateStr]) return DB_CACHE.daily[dateStr].notes || '';
  try { return localStorage.getItem('notes_' + dateStr) || ''; } catch(e) { return ''; }
}
function setNotes(dateStr, text) { dbSaveDaily(dateStr, 'notes', text); }

function getWater(dateStr) { return _getDailyField(dateStr, 'water'); }
function setWater(dateStr, count) { dbSaveDaily(dateStr, 'water', count); }
function toggleWater(dateStr, idx) {
  const current = getWater(dateStr);
  const newCount = (idx + 1 <= current) ? idx : idx + 1;
  setWater(dateStr, newCount);
  renderDaily();
}
function getCoffee(dateStr) { return _getDailyField(dateStr, 'coffee'); }
function setCoffee(dateStr, count) { dbSaveDaily(dateStr, 'coffee', count); }
function toggleCoffee(dateStr, idx) {
  const current = getCoffee(dateStr);
  const newCount = (idx + 1 <= current) ? idx : idx + 1;
  setCoffee(dateStr, newCount);
  renderDaily();
}

// Mood (1-10), Energy (1-10), Sleep (hours), Weight (lbs)
function getMood(dateStr) { return _getDailyField(dateStr, 'mood'); }
function setMood(dateStr, val) { dbSaveDaily(dateStr, 'mood', val); renderDaily(); }
function getEnergy(dateStr) { return _getDailyField(dateStr, 'energy'); }
function setEnergy(dateStr, val) { dbSaveDaily(dateStr, 'energy', val); renderDaily(); }
function getSleep(dateStr) { return _getDailyField(dateStr, 'sleep'); }
function setSleep(dateStr, val) { dbSaveDaily(dateStr, 'sleep', val); renderDaily(); }
function getWeight(dateStr) { return _getDailyField(dateStr, 'weight'); }
function setWeight(dateStr, val) { dbSaveDaily(dateStr, 'weight', val); renderDaily(); }

// Exercise ratings: -1 = frowny, 0 = neutral, 1 = smiley
function getRatings(dateStr) {
  if (DB_CACHE.ratings[dateStr]) return { ...DB_CACHE.ratings[dateStr] };
  try { return JSON.parse(localStorage.getItem('ratings_' + dateStr)) || {}; } catch(e) { return {}; }
}
function setRating(dateStr, exerciseKey, val) {
  dbSaveRating(dateStr, exerciseKey, val);
}
function cycleRating(dateStr, exerciseKey) {
  const ratings = getRatings(dateStr);
  const cur = ratings[exerciseKey];
  const next = cur === undefined ? 1 : cur === 1 ? 0 : cur === 0 ? -1 : undefined;
  dbSaveRating(dateStr, exerciseKey, next);
}
function ratingEmoji(val) { return val === 1 ? '😊' : val === 0 ? '😐' : val === -1 ? '😞' : '☆'; }
function toggleRating(dateStr, rKey, val, routineKey) {
  const ratings = getRatings(dateStr);
  const newVal = ratings[rKey] === val ? undefined : val;
  dbSaveRating(dateStr, rKey, newVal);
  openRoutinePopup(routineKey, dateStr);
}

// ══════════════════════════════════════════════
// TRACKING SECTION (Mood/Energy/Sleep/Weight)
// ══════════════════════════════════════════════
function buildTrackingSection(dateStr) {
  const mood = getMood(dateStr);
  const energy = getEnergy(dateStr);
  const sleep = getSleep(dateStr);

  // Mood dots (1-10)
  const moodColor = mood >= 7 ? 'var(--green)' : mood >= 4 ? 'var(--orange)' : mood > 0 ? 'var(--red)' : 'var(--text-muted)';
  let moodDots = '';
  for (let i = 1; i <= 10; i++) {
    const active = mood === i;
    moodDots += `<div class="track-dot ${active ? 'mood-active' : ''}" onclick="setMood('${dateStr}',${mood === i ? 0 : i})">${i}</div>`;
  }

  // Energy dots (1-10)
  const energyColor = energy >= 7 ? 'var(--cyan)' : energy >= 4 ? 'var(--orange)' : energy > 0 ? 'var(--red)' : 'var(--text-muted)';
  let energyDots = '';
  for (let i = 1; i <= 10; i++) {
    const active = energy === i;
    energyDots += `<div class="track-dot ${active ? 'energy-active' : ''}" onclick="setEnergy('${dateStr}',${energy === i ? 0 : i})">${i}</div>`;
  }

  // Sleep — tappable half-hour increments 4h-10h
  const sleepOptions = [4,5,5.5,6,6.5,7,7.5,8,9,10];
  const sleepColor = sleep >= 7 ? 'var(--green)' : sleep >= 5.5 ? 'var(--orange)' : sleep > 0 ? 'var(--red)' : 'var(--text-muted)';
  let sleepDots = '';
  sleepOptions.forEach(h => {
    const active = sleep === h;
    const label = h % 1 === 0 ? h : '½';
    sleepDots += `<div class="track-dot ${active ? 'active' : ''}" style="${active ? 'background:'+sleepColor+';border-color:'+sleepColor : ''}" onclick="setSleep('${dateStr}',${sleep === h ? 0 : h})">${label}</div>`;
  });

  return `
    <div class="tracking-section">
      <div class="track-row">
        <span class="track-label" style="color:${moodColor}">Mood</span>
        <div class="track-dots">${moodDots}</div>
      </div>
      <div class="track-row">
        <span class="track-label" style="color:${energyColor}">Energy</span>
        <div class="track-dots">${energyDots}</div>
      </div>
      <div class="track-row">
        <span class="track-label" style="color:${sleepColor}">Sleep</span>
        <div class="track-dots">${sleepDots}</div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════
// POPUP SYSTEM
// ══════════════════════════════════════════════
function openRoutinePopup(routineKey, dateStr) {
  const routine = ROUTINES[routineKey];
  if (!routine) return;
  const checked = getChecked(dateStr);
  const prefix = 'r_' + routineKey + '_';

  document.getElementById('popup-title').textContent = routine.title;
  const ratings = getRatings(dateStr);
  document.getElementById('popup-body').innerHTML =
    '<div class="exercise-list">' +
    routine.exercises.map((ex, i) => {
      const key = prefix + i;
      const done = checked[key] ? 'done' : '';
      const rKey = routineKey + '_' + i;
      const rating = ratings[rKey];
      return `
        <div class="exercise-item ${done}">
          <div class="check-box" onclick="toggleExercise(this.parentElement,'${dateStr}','${key}')">${done ? '✓' : ''}</div>
          <div class="ex-info" onclick="toggleExercise(this.parentElement,'${dateStr}','${key}')">
            <div class="ex-name">${ex.name}${ex.sets ? ' <span style="color:var(--text-dim);font-weight:400;font-size:11px">' + ex.sets + '</span>' : ''}</div>
            <div class="ex-detail">${ex.detail}</div>
            ${ex.link ? '<a class="ex-link" href="' + ex.link + '" target="_blank" onclick="event.stopPropagation()">▶ Watch video</a>' : ''}
          </div>
          <div style="display:flex;gap:2px;margin-left:auto;flex-shrink:0" onclick="event.stopPropagation()">
            <span class="rating-btn ${rating === -1 ? 'active' : ''}" onclick="toggleRating('${dateStr}','${rKey}',-1,'${routineKey}')">😞</span>
            <span class="rating-btn ${rating === 0 ? 'active' : ''}" onclick="toggleRating('${dateStr}','${rKey}',0,'${routineKey}')">😐</span>
            <span class="rating-btn ${rating === 1 ? 'active' : ''}" onclick="toggleRating('${dateStr}','${rKey}',1,'${routineKey}')">😊</span>
          </div>
        </div>`;
    }).join('') +
    '</div>' +
    '<div class="notes-section">' +
      '<div class="notes-label">Notes for ' + dateStr + '</div>' +
      '<textarea class="notes-input" placeholder="How did it feel? Any modifications? Energy level?" oninput="setNotes(\'' + dateStr + '\',this.value)">' + getNotes(dateStr) + '</textarea>' +
    '</div>';
  document.getElementById('popup-backdrop').classList.add('open');
}

function closePopup() {
  document.getElementById('popup-backdrop').classList.remove('open');
}

function toggleExercise(el, dateStr, key) {
  const isDone = el.classList.toggle('done');
  el.querySelector('.check-box').textContent = isDone ? '✓' : '';
  setChecked(dateStr, key, isDone);
}

function toggleScheduleItem(el, dateStr, key) {
  const isDone = el.classList.toggle('done');
  el.querySelector('.check-box').textContent = isDone ? '✓' : '';
  setChecked(dateStr, key, isDone);
}

function getRoutineKey(wo) {
  if (!wo) return null;
  if (wo.type === 'gym') return 'gym';
  if (wo.type === 'yoga') return 'yoga';
  if (wo.type === 'row' && wo.label.includes('Interval')) return 'row_intervals';
  if (wo.type === 'row') return 'row_steady';
  return null;
}

// DASHBOARD ENGINE

let currentDayOffset = 0;   // 0 = today
let currentMonthOffset = 0; // 0 = current month
let currentWeekOffset = 0;  // 0 = current week

function ds(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(d) { return ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()]+' '+d.getDate()+', '+d.getFullYear(); }
function dayName(d) { return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]; }
function shortDay(d) { return ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()]; }
function fmtTime(d) { let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0'); const ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+m+' '+ap; }

function custodyInfo(dateStr) {
  const t = (CUSTODY_CALENDAR[dateStr] || "").toUpperCase();
  if (t === "L") return { text: "LISA DAY", cls: "lisa" };
  if (t === "C") return { text: "CRAIG DAY", cls: "craig" };
  return { text: "", cls: "" };
}
function custodyType(dateStr) { return (CUSTODY_CALENDAR[dateStr] || "").toUpperCase(); }
function isKidDay(dateStr) { return custodyType(dateStr) === "L"; }
function getEvents(dateStr) { return CSV_EVENTS[dateStr] || ''; }
function isHoliday(dateStr) { return (CSV_EVENTS[dateStr] || '').includes('🍁'); }
function eventIcon(dateStr) { return isHoliday(dateStr) ? '🍁' : '📅'; }
function wIcon(t) { return {row:"🚣",gym:"🏋️",stretch:"🧘",bodyweight:"💪",yoga:"🧘",outdoor:"🌲",rest:"😴"}[t]||"💪"; }
function timingLabel(t) { return {morning:"☀️ Before Work",evening:"🌙 After Bedtime",anytime:"🕐 Anytime"}[t]||t.toUpperCase(); }
function isAlloDay(d) { const ref=new Date(2026,2,23); return Math.floor((d-ref)/(864e5))%2===0; }

// ── DAILY VIEW ──
function renderDaily() {
  const now = new Date();
  now.setDate(now.getDate() + currentDayOffset);
  const dateStr = ds(now);
  const cust = custodyInfo(dateStr);
  const wo = WORKOUT_PLANS[dateStr];

  const strR = STRETCH_ROTATION[dateStr] || "A";
  const allo = isAlloDay(now);

  const tmr = new Date(now); tmr.setDate(tmr.getDate()+1);
  const tmrStr = ds(tmr);
  const tmrWo = WORKOUT_PLANS[tmrStr];
  const tmrCust = custodyInfo(tmrStr);

  document.getElementById('day-name').textContent = dayName(now);
  document.getElementById('date-full').textContent = fmtDate(now);
  const timeStr = fmtTime(now);

  document.getElementById('week-time-display').textContent = timeStr;
  document.getElementById('month-time-display').textContent = timeStr;

  const badge = document.getElementById('custody-badge');
  badge.className = 'custody-badge ' + cust.cls;

  badge.style.display = cust.cls ? '' : 'none';

  // Workout card
  const wc = document.getElementById('workout-card');

  const morningHtml = `

  if (wo) {
    wc.innerHTML = morningHtml + `
      <div class="workout-type ${wo.type}" style="cursor:pointer" onclick="openRoutinePopup('${rKey}','${dateStr}')">${wIcon(wo.type)} ${wo.label}</div>
      <div class="workout-details">
        <div class="target">${wo.target}</div>
        <div>${wo.details}</div>
      </div>
      <span class="workout-tag ${wo.timing}">${timingLabel(wo.timing)}</span>
      <div class="stretch-indicator" onclick="openRoutinePopup('stretch_${strR}','${dateStr}')" style="cursor:pointer">
        <span class="stretch-label" style="color:var(--purple);font-size:13px">🧘 Stretch ${strR}</span>
        <span style="display:flex;gap:6px">${['A','B','C'].map(r=>`<div class="stretch-pip ${strR===r?'active':''}" title="Routine ${r}"></div>`).join('')}</span>
      </div>
      ${tmrWo ? `<div class="card-footer"><div class="tomorrow-strip"><span class="tmr-label">Tomorrow</span> ${wIcon(tmrWo.type)} ${tmrWo.label}</div></div>` : ''}
    `;
  } else {
    wc.innerHTML = morningHtml + `<div class="workout-type rest">😴 Rest Day</div><div class="workout-details">No workout scheduled. Recovery is part of the plan.</div>
      <div class="stretch-indicator" onclick="openRoutinePopup('stretch_${strR}','${dateStr}')" style="cursor:pointer">
        <span class="stretch-label" style="color:var(--purple);font-size:13px">🧘 Stretch ${strR}</span>
        <span style="display:flex;gap:6px">${['A','B','C'].map(r=>`<div class="stretch-pip ${strR===r?'active':''}" title="Routine ${r}"></div>`).join('')}</span>
      </div>
      ${tmrWo ? `<div class="card-footer"><div class="tomorrow-strip"><span class="tmr-label">Tomorrow</span> ${wIcon(tmrWo.type)} ${tmrWo.label}</div></div>` : ''}`;
  }

  // Meals card
  const waterCount = getWater(dateStr);
  const coffeeCount = getCoffee(dateStr);
  document.getElementById('meals-card').innerHTML = meals.map((m,i) => {
    const mDone = checked['m_'+i] ? 'done' : '';
    return `
    <div class="check-row ${mDone}" onclick="toggleScheduleItem(this,'${dateStr}','m_${i}')">
      <div class="meal-time">${m.time}</div>
      <div class="check-box">${mDone ? '✓' : ''}</div>
      <div class="check-text"><div class="meal-name">${m.name}</div><div class="meal-cal">${m.cal}</div></div>
    </div>`;
  }).join('') + `
    <div class="card-footer">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
        <div class="supp-row" style="flex:1;margin:0">
          <span class="supp-pill">💊 D3</span>
          <span class="supp-pill">🐟 Omega-3</span>
          <span class="supp-pill">🧲 Mag</span>
          <span class="supp-pill">🍊 Vit C</span>
          <span class="supp-pill">💪 Creatine</span>
        </div>
        ${(() => {
          const weight = getWeight(dateStr);
          let prevWeight = 0;
          for (let i = 1; i <= 30; i++) {
            const d = new Date(dateStr + 'T12:00:00');
            d.setDate(d.getDate() - i);
            const pw = getWeight(ds(d));
            if (pw > 0) { prevWeight = pw; break; }
          }
          const weightDelta = weight > 0 && prevWeight > 0 ? (weight - prevWeight).toFixed(1) : '';
          const weightColor = weightDelta < 0 ? 'var(--green)' : weightDelta > 0 ? 'var(--red)' : 'var(--text-dim)';
          return `<div style="display:flex;align-items:center;gap:3px;flex-shrink:0">
            <span style="font-size:10px">⚖️</span>
            <input type="number" class="track-input" style="width:52px" placeholder="lbs" step="0.5" min="150" max="350"
              value="${weight || ''}" onchange="setWeight('${dateStr}',parseFloat(this.value)||0)">
            ${weightDelta ? `<span style="font-size:10px;font-weight:700;color:${weightColor}">${weightDelta > 0 ? '+' : ''}${weightDelta}</span>` : ''}
          </div>`;
        })()}
      </div>
      <div class="water-tracker">
        ${[0,1,2,3,4,5,6,7].map(i => `<span class="water-drop ${i < waterCount ? 'filled' : ''}" onclick="toggleWater('${dateStr}',${i})">💧</span>`).join('')}
        ${[0,1].map(i => `<span class="coffee-icon ${i < coffeeCount ? 'filled' : ''}" onclick="toggleCoffee('${dateStr}',${i})">☕</span>`).join('')}
      </div>
    </div>`;

  // Schedule card — with checkboxes
  const ev = getEvents(dateStr);
  const csvNote = CSV_NOTES[dateStr] || '';
  const todayC = custodyType(dateStr);
  const prevD = new Date(now); prevD.setDate(prevD.getDate()-1);
  const prevC = custodyType(ds(prevD));
  const nextD = new Date(now); nextD.setDate(nextD.getDate()+1);
  const nextC = custodyType(ds(nextD));
  const dow = now.getDay(); // 0=Sun ... 6=Sat

  let items = [];
  if (allo) items.push({k:"allo",t:"AM",txt:"💊 Allopurinol 100mg",sub:""});
  items.push({k:"morning",t:"AM",txt:"☀️ 5-min morning stretch",sub:""});
  if (wo && wo.timing==="morning") items.push({k:"workout",t:"AM",txt:wIcon(wo.type)+" "+wo.label,sub:wo.target});
  if (ev) items.push({k:"event",t:"",txt:eventIcon(dateStr)+" "+ev.replace('🍁 ',''),sub:""});
  if (csvNote) items.push({k:"note",t:"",txt:"📝 "+csvNote,sub:""});
  // School pickup on kid days (C) weekdays — skip if NO_SCHOOL set or CSV notes flag it
  const noSchool = NO_SCHOOL.has(dateStr) || (csvNote && /break|holiday|no school|PD day/i.test(csvNote));
  if (todayC === 'C' && !noSchool && dow >= 1 && dow <= 4) items.push({k:"school",t:"2:30",txt:"🏫 School Pickup",sub:""});
  if (todayC === 'C' && !noSchool && dow === 5) items.push({k:"school",t:"12P",txt:"🏫 School Pickup (early Friday)",sub:""});
  items.push({k:"work",t:"8–5",txt:"💻 Work",sub:""});
  if (wo && wo.timing==="anytime") items.push({k:"workout",t:"🕐",txt:wIcon(wo.type)+" "+wo.label,sub:wo.target});
  // Kids arrive: today is L (kid-free), tomorrow is C → kids come to you at 5pm tonight
  if (todayC === 'L' && nextC === 'C') items.push({k:"kids_arrive",t:"5P",txt:"👧 Kids Arrive",sub:""});
  // Kids leave: today is C (have kids), tomorrow is L → Lisa picks up at 5pm tonight
  if (todayC === 'C' && nextC === 'L') items.push({k:"kids_leave",t:"5P",txt:"👋 Kids Leave",sub:""});
  if (wo && wo.timing==="evening") items.push({k:"workout",t:"PM",txt:"🌙 "+wo.label,sub:wo.target});
  items.push({k:"stretch",t:"PM",txt:"🧘 Stretch Routine "+strR,sub:""});

  // Optional/alt workout items — checkable, with divider
  if (wo && (wo.optional || wo.alt)) items.push({k:"_divider",t:"",txt:"— optional —",sub:"",divider:true});
  if (wo && wo.optional) items.push({k:"optional",t:"⚡",txt:wo.optional,sub:""});
  if (wo && wo.alt) items.push({k:"alt",t:"🔄",txt:wo.alt.replace(/^Alt:\s*/,''),sub:""});

  document.getElementById('schedule-card').innerHTML = items.map(i=>{
    if (i.divider) return `<div class="options-divider">${i.txt}</div>`;
    const done = checked['s_'+i.k] ? 'done' : '';
    return `
    <div class="check-row ${done}">
      <div class="sched-time">${i.t}</div>
      <div class="check-box" onclick="toggleScheduleItem(this.parentElement,'${dateStr}','s_${i.k}')">${done ? '✓' : ''}</div>
      <div class="check-text" ${i.popup ? `onclick="openRoutinePopup('${i.popup}','${dateStr}')" style="cursor:pointer"` : `onclick="toggleScheduleItem(this.parentElement,'${dateStr}','s_${i.k}')"`}>

  // Custody strip — 14 days, today is day 3 (index 2)
  const dows = ['S','M','T','W','T','F','S'];
  let csHtml = '<div class="custody-strip">';
  for (let ci = -2; ci <= 11; ci++) {
    const cd = new Date(now);
    cd.setDate(cd.getDate() + ci);
    const cdStr = ds(cd);
    const cc = custodyType(cdStr);
    const isCur = ci === 0;
    const cls = cc === 'C' ? 'cs-craig' : cc === 'L' ? 'cs-lisa' : 'cs-unknown';
    const isStatHoliday = (CSV_EVENTS[cdStr] || '').includes('🍁');

    const hlCls = isStatHoliday ? 'cs-holiday' : (isNoSchool ? 'cs-noschool' : '');
    csHtml += `<div style="display:flex;flex-direction:column;align-items:center;gap:1px">`;
    csHtml += `<div class="cs-dow">${dows[cd.getDay()]}${cd.getDate()}</div>`;
    csHtml += `<div class="cs-box ${cls} ${isCur?'cs-today':''} ${hlCls}">${cc || '?'}</div>`;
    csHtml += `</div>`;
  }
  csHtml += '</div>';

  // Bottom bar — just custody strip, centered
  document.getElementById('bottom-bar').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;white-space:nowrap">
      <div class="pill">🍽️ Eating: <span class="pill-val cyan">12 PM – 9 PM</span></div>
      <div class="pill">☕ Cutoff: <span class="pill-val cyan">10 AM</span></div>
      ${allo ? '<div class="pill">💊 <span class="pill-val red">Allo day</span></div>' : ''}
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <div style="display:flex;flex-direction:column;gap:2px;margin-right:4px;white-space:nowrap">
        <span style="font-size:7px;color:var(--cyan)">▂ No school</span>
        <span style="font-size:7px;color:var(--red)">▂ Stat holiday</span>
      </div>
      ${csHtml}
    </div>
  `;
}

// ── WEEK VIEW ──
function getDayProgress(dateStr) {
  const checked = getChecked(dateStr);
  const wo = WORKOUT_PLANS[dateStr];
  const cust = custodyType(dateStr);
  const d = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay();

  // Build labelled task list — 'show' flag controls week view visibility
  // Fitness-relevant items show on week view; routine life stuff doesn't
  const tasks = [];
  tasks.push({k:'morning', label:'☀️ Morning Stretch', show:true});
  if (isAlloDay(dateStr)) tasks.push({k:'allo', label:'💊 Allopurinol', show:true});
  if (wo) tasks.push({k:'workout', label: wIcon(wo.type) + ' ' + wo.label, show:true});
  const noteForDay = CSV_NOTES[dateStr] || '';
  const schoolOff = NO_SCHOOL.has(dateStr) || /break|holiday|no school|PD day/i.test(noteForDay);
  if (cust === 'C' && dow >= 1 && dow <= 5 && !schoolOff) tasks.push({k:'school', label:'🏫 Pickup', show:false});
  tasks.push({k:'work', label:'💻 Work', show:false});
  tasks.push({k:'stretch', label:'🧘 Stretch', show:true});
  if (wo && wo.optional) tasks.push({k:'optional', label:'⚡ Bonus', show:true});
  if (wo && wo.alt) tasks.push({k:'alt', label:'🔄 Alt workout', show:true});

  const prev = new Date(d); prev.setDate(prev.getDate()-1);
  const next = new Date(d); next.setDate(next.getDate()+1);
  if (cust === 'L' && custodyType(ds(next)) === 'C') tasks.push({k:'kids_arrive', label:'👧 Kids arrive', show:false});
  if (cust === 'C' && custodyType(ds(next)) === 'L') tasks.push({k:'kids_leave', label:'👋 Kids leave', show:false});

  for (let i = 0; i < 5; i++) tasks.push({k:'m_'+i, label:['☕ Coffee','🍽️ Lunch','🍎 Snack','🍖 Dinner','🌙 Evening'][i], show:false});

  let done = 0;
  const completed = [];
  const remaining = [];
  tasks.forEach(t => {
    const isDone = t.k.startsWith('m_') ? checked[t.k] : checked['s_' + t.k];
    if (isDone) { done++; if (t.show) completed.push(t.label); }
    else { if (t.show) remaining.push(t.label); }
  });
  return { done, total: tasks.length, completed, remaining, wo };
}

function renderWeek() {
  const now = new Date();
  const todayStr = ds(now);

  // Find Sunday of the target week
  const sun = new Date(now);
  sun.setDate(sun.getDate() - sun.getDay() + (currentWeekOffset * 7));

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(sun);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const rangeStr = mo[sun.getMonth()] + ' ' + sun.getDate() + ' – ' + mo[days[6].getMonth()] + ' ' + days[6].getDate();

  document.getElementById('week-title').textContent = currentWeekOffset === 0 ? 'This Week' : mo[sun.getMonth()] + ' ' + sun.getDate() + ' – ' + mo[days[6].getMonth()] + ' ' + days[6].getDate();
  document.getElementById('week-range').textContent = currentWeekOffset === 0 ? rangeStr : '';

  const grid = document.getElementById('week-grid');

  // Track weekly totals for summary
  let weekWorkouts = 0, weekWorkoutsDone = 0;
  let weekStretches = 0, weekStretchesDone = 0;
  let weekMeals = 0, weekMealsDone = 0;
  let weekMornings = 0, weekMorningsDone = 0;
  let weekWater = 0, weekTotalDone = 0, weekTotalAll = 0;

  const dayCards = days.map(d => {
    const dStr = ds(d);
    const cc = custodyType(dStr);
    const wo = WORKOUT_PLANS[dStr];
    const ev = getEvents(dStr);
    const csvNote = CSV_NOTES[dStr] || '';
    const isToday = dStr === todayStr;
    const prog = getDayProgress(dStr);
    const pct = prog.total > 0 ? Math.round(prog.done / prog.total * 100) : 0;
    const pColor = pct === 100 ? 'var(--green)' : pct > 50 ? 'var(--cyan)' : pct > 0 ? 'var(--orange)' : 'var(--text-muted)';
    const checked = getChecked(dStr);

    // Tally weekly stats
    if (wo) { weekWorkouts++; if (checked['s_workout']) weekWorkoutsDone++; }
    weekStretches++; if (checked['s_stretch']) weekStretchesDone++;
    weekMornings++; if (checked['s_morning']) weekMorningsDone++;
    for (let i = 0; i < 5; i++) { weekMeals++; if (checked['m_'+i]) weekMealsDone++; }
    weekWater += getWater(dStr);
    weekTotalDone += prog.done;
    weekTotalAll += prog.total;

    const dayClass = cc === 'C' ? 'craig-day' : cc === 'L' ? 'lisa-day' : '';
    const badgeClass = cc === 'C' ? 'craig' : cc === 'L' ? 'lisa' : '';
    const badgeText = cc || '';
    const strR = STRETCH_ROTATION[dStr] || 'A';

    // Holiday / no-school bottom highlight
    const isStatHoliday = (ev || '').includes('🍁');
    const isNoSchool = NO_SCHOOL.has(dStr) || /break|holiday|PD day|convention/i.test(csvNote);
    const wkBottomBorder = isStatHoliday ? 'border-bottom:3px solid var(--red)' : (isNoSchool ? 'border-bottom:3px solid var(--cyan)' : '');

    const remainHtml = prog.remaining.length > 0
      ? `<div class="wd-remaining"><div class="wd-section-label" style="color:var(--text-muted)">To do</div>${prog.remaining.map(c => `<span class="wd-remain-item">${c}</span>`).join('')}</div>`
      : `<div class="wd-remaining" style="color:var(--green);font-size:12px;font-weight:700">✓ All done!</div>`;
    const doneHtml = prog.completed.length > 0
      ? `<div class="wd-done-list"><div class="wd-section-label" style="color:var(--green)">Done ✓</div>${prog.completed.map(c => `<span class="wd-done-item">${c}</span>`).join('')}</div>`
      : '';

    return `
      <div class="week-day ${dayClass} ${isToday?'today':''}" style="${wkBottomBorder}">
        <div class="wd-header">
          <div>
            <div class="wd-dayname">${shortDay(d)}</div>
            <div class="wd-date">${d.getDate()}</div>
          </div>
          ${badgeText ? `<div class="wd-badge ${badgeClass}">${badgeText}</div>` : ''}
        </div>
        <div style="min-height:18px">
          ${ev ? `<div class="wd-event">${eventIcon(dStr)} ${ev.replace('🍁 ','')}</div>` : ''}
          ${csvNote ? `<div class="wd-event" style="color:var(--cyan)">📝 ${csvNote}</div>` : ''}
        </div>
        <div class="wd-progress">
          <div class="wd-progress-bar"><div class="wd-progress-fill" style="width:${pct}%;background:${pColor}"></div></div>
          <span class="wd-progress-text" style="color:${pColor}">${prog.done}/${prog.total}</span>
        </div>
        ${remainHtml}
        ${doneHtml}
        ${(() => {
          const m = getMood(dStr), e = getEnergy(dStr), s = getSleep(dStr);
          if (!m && !e && !s) return '';
          const parts = [];
          if (m) parts.push('<span style="color:' + (m>=7?'var(--green)':m>=4?'var(--orange)':'var(--red)') + '">😊' + m + '</span>');
          if (e) parts.push('<span style="color:' + (e>=7?'var(--cyan)':e>=4?'var(--orange)':'var(--red)') + '">⚡' + e + '</span>');
          if (s) parts.push('<span style="color:' + (s>=7?'var(--green)':s>=5.5?'var(--orange)':'var(--red)') + '">😴' + s + 'h</span>');
          return '<div style="font-size:9px;display:flex;gap:6px;margin-top:4px;padding-top:4px;border-top:1px dashed rgba(255,255,255,0.06)">' + parts.join('') + '</div>';
        })()}
      </div>
    `;
  }).join('');

  // Summary card for the 8th slot
  const totalPct = weekTotalAll > 0 ? Math.round(weekTotalDone / weekTotalAll * 100) : 0;
  function summaryRow(label, done, total, color) {
    const p = total > 0 ? Math.round(done/total*100) : 0;
    return `<div class="ws-row">
      <span class="ws-label">${label}</span>
      <div class="ws-bar"><div class="ws-bar-fill" style="width:${p}%;background:${color}"></div></div>
      <span class="ws-value" style="color:${done===total && total>0 ? 'var(--green)' : color}">${done}/${total}</span>
    </div>`;
  }

  const summaryCard = `
    <div class="week-summary">
      <div class="ws-title">📊 Week Summary</div>
      ${summaryRow('🏋️ Exercise', weekWorkoutsDone, weekWorkouts, 'var(--cyan)')}
      ${summaryRow('🧘 Stretch', weekStretchesDone, weekStretches, 'var(--purple)')}
      ${summaryRow('☀️ Morning', weekMorningsDone, weekMornings, 'var(--orange)')}
      ${summaryRow('🍽️ Meals', weekMealsDone, weekMeals, 'var(--green)')}
      <div class="ws-row" style="margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.05)">
        <span class="ws-label">💧 Water</span>
        <span class="ws-value" style="color:var(--cyan)">${weekWater} × 375ml</span>
      </div>
    </div>
  `;

  grid.innerHTML = dayCards + summaryCard;

  // Week legend with holiday indicators
  document.getElementById('week-legend').innerHTML = `
    <div class="legend-item"><span style="color:var(--cyan)">▂</span> No school</div>
    <div class="legend-item"><span style="color:var(--red)">▂</span> Stat holiday</div>
  `;
}

// ── MONTH VIEW ──
function renderMonth() {
  const now = new Date();
  const todayStr = ds(now);
  const viewDate = new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1);
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  document.getElementById('month-title').textContent = currentMonthOffset === 0 ? 'This Month' : monthNames[month] + ' ' + year;

  // DOW header
  document.getElementById('month-dow-row').innerHTML =
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="month-dow">${d}</div>`).join('');

  // Build grid
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  // Monthly stats accumulators
  let mWorkouts = 0, mWorkoutsDone = 0;
  let mStretches = 0, mStretchesDone = 0;
  let mMornings = 0, mMorningsDone = 0;
  let mWater = 0;
  let mRow = 0, mGym = 0, mYoga = 0, mOutdoor = 0;
  let mCraigDays = 0, mLisaDays = 0;
  let mTotalDone = 0, mTotalAll = 0;
  let mMoodSum = 0, mMoodCount = 0, mEnergySum = 0, mEnergyCount = 0;
  let mSleepSum = 0, mSleepCount = 0;
  let mWeightFirst = 0, mWeightLast = 0;

  // Count trailing empty cells
  const trailingEmpty = totalCells - (firstDay + daysInMonth);

  let html = '';
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - firstDay + 1;
    if (dayNum < 1) {
      html += '<div class="month-cell empty"></div>';
    } else if (dayNum > daysInMonth) {
      // trailing empties — skip, we'll add summary card instead
      continue;
    } else {
      const d = new Date(year, month, dayNum);
      const dStr = ds(d);
      const cust = custodyType(dStr);
      const wo = WORKOUT_PLANS[dStr];
      const ev = getEvents(dStr);
      const isToday = dStr === todayStr;
      const strR = STRETCH_ROTATION[dStr] || 'A';
      const isPastOrToday = dStr <= todayStr;
      const checked = getChecked(dStr);

      // Accumulate monthly stats
      if (cust === 'C') mCraigDays++; else if (cust === 'L') mLisaDays++;
      if (wo) {
        mWorkouts++;
        if (checked['s_workout']) mWorkoutsDone++;
        if (wo.type === 'row') mRow++;
        else if (wo.type === 'gym') mGym++;
        else if (wo.type === 'yoga') mYoga++;
        else if (wo.type === 'outdoor') mOutdoor++;
      }
      mStretches++; if (checked['s_stretch']) mStretchesDone++;
      mMornings++; if (checked['s_morning']) mMorningsDone++;
      mWater += getWater(dStr);
      const dayMood = getMood(dStr); if (dayMood) { mMoodSum += dayMood; mMoodCount++; }
      const dayEnergy = getEnergy(dStr); if (dayEnergy) { mEnergySum += dayEnergy; mEnergyCount++; }
      const daySleep = getSleep(dStr); if (daySleep) { mSleepSum += daySleep; mSleepCount++; }
      const dayWeight = getWeight(dStr);
      if (dayWeight > 0) { if (!mWeightFirst) mWeightFirst = dayWeight; mWeightLast = dayWeight; }
      if (isPastOrToday) {
        const prog = getDayProgress(dStr);
        mTotalDone += prog.done;
        mTotalAll += prog.total;
      }

      const prog = getDayProgress(dStr);
      const pct = prog.total > 0 ? Math.round(prog.done / prog.total * 100) : 0;
      const pColor = pct === 100 ? 'var(--green)' : pct > 50 ? 'var(--cyan)' : pct > 0 ? 'var(--orange)' : 'var(--text-muted)';

      const cellClass = cust === 'C' ? 'craig' : cust === 'L' ? 'lisa' : '';
      const badgeLabel = cust || '';

      // Holiday / no-school bottom highlight
      const mcIsStatHoliday = (ev || '').includes('🍁');
      const mcCsvNote = CSV_NOTES[dStr] || '';
      const mcIsNoSchool = NO_SCHOOL.has(dStr) || /break|holiday|PD day|convention/i.test(mcCsvNote);
      const mcBottomBorder = mcIsStatHoliday ? 'border-bottom:3px solid var(--red)' : (mcIsNoSchool ? 'border-bottom:3px solid var(--cyan)' : '');

      let woHtml = '';
      if (wo) {
        const short = wo.label.split('—')[0].split('–')[0].trim();
        woHtml = `<div class="mc-workout">${wIcon(wo.type)} ${short}</div>`;
      }

      const csvNote = CSV_NOTES[dStr] || '';
      let evHtml = '';
      if (ev) {
        const evShort = ev.replace('🍁 ','').substring(0, 18);
        evHtml = `<div class="mc-event">${eventIcon(dStr)} ${evShort}</div>`;
      } else if (csvNote) {
        const noteShort = csvNote.substring(0, 16);
        evHtml = `<div class="mc-event">📝 ${noteShort}</div>`;
      }

      const strHtml = `<div class="mc-stretch">🧘 ${strR}</div>`;

      const progHtml = isPastOrToday ? `
        <div class="mc-progress">
          <div class="mc-progress-bar"><div class="mc-progress-fill" style="width:${pct}%;background:${pColor}"></div></div>
          <span class="mc-progress-text" style="color:${pct === 0 && !isPastOrToday ? 'transparent' : pColor}">${pct}%</span>
        </div>` : '';

      const diffMs = d.getTime() - new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const dayOffset = Math.round(diffMs / 86400000);

      html += `
        <div class="month-cell ${cellClass} ${isToday?'today':''}" style="${mcBottomBorder}" onclick="goToDay(${dayOffset})">
          <div class="mc-top">
            <div class="mc-date">${dayNum}</div>
            ${badgeLabel ? `<span class="mc-badge ${cellClass}">${badgeLabel}</span>` : ''}
          </div>
          <div class="mc-body">
            ${woHtml}
            ${evHtml}
            ${strHtml}
          </div>
          ${progHtml}
        </div>`;
    }
  }

  // Monthly summary card in the trailing empty cells
  const span = trailingEmpty > 0 ? trailingEmpty : 7;
  const overallPct = mTotalAll > 0 ? Math.round(mTotalDone / mTotalAll * 100) : 0;
  const overallColor = overallPct === 100 ? 'var(--green)' : overallPct > 50 ? 'var(--cyan)' : 'var(--orange)';

  // Stacked bar segments (proportional widths based on done counts)
  const totalDone = mWorkoutsDone + mStretchesDone + mMorningsDone;
  const totalPossible = mWorkouts + mStretches + mMornings;
  const exPct = totalPossible > 0 ? (mWorkoutsDone / totalPossible * 100) : 0;
  const stPct = totalPossible > 0 ? (mStretchesDone / totalPossible * 100) : 0;
  const moPct = totalPossible > 0 ? (mMorningsDone / totalPossible * 100) : 0;

  html += `
    <div class="month-cell" style="grid-column:span ${span};cursor:default;padding:6px 10px;flex-direction:row;align-items:center;gap:10px">
      <div style="font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:1px;white-space:nowrap">📊 ${monthNames[month]}</div>
      <div style="display:flex;flex-direction:column;flex:1;gap:3px">
        <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,0.06)">
          <div style="width:${exPct}%;background:var(--cyan)" title="Exercise ${mWorkoutsDone}/${mWorkouts}"></div>
          <div style="width:${stPct}%;background:var(--purple)" title="Stretch ${mStretchesDone}/${mStretches}"></div>
          <div style="width:${moPct}%;background:var(--orange)" title="Morning ${mMorningsDone}/${mMornings}"></div>
        </div>
        <div style="display:flex;gap:8px;font-size:10px;color:var(--text-dim)">
          <span style="color:var(--cyan)">🏋️ ${mWorkoutsDone}/${mWorkouts}</span>
          <span style="color:var(--purple)">🧘 ${mStretchesDone}/${mStretches}</span>
          <span style="color:var(--orange)">☀️ ${mMorningsDone}/${mMornings}</span>
          ${mMoodCount ? `<span>😊 ${(mMoodSum/mMoodCount).toFixed(1)}</span>` : ''}
          ${mEnergyCount ? `<span>⚡ ${(mEnergySum/mEnergyCount).toFixed(1)}</span>` : ''}
          ${mSleepCount ? `<span>😴 ${(mSleepSum/mSleepCount).toFixed(1)}h</span>` : ''}
          ${mWeightFirst && mWeightLast ? `<span style="color:${mWeightLast<=mWeightFirst?'var(--green)':'var(--red)'}">⚖️ ${mWeightLast}lb</span>` : ''}
          <span style="margin-left:auto"><span style="color:var(--green)">C:${mCraigDays}</span>/<span style="color:var(--pink)">L:${mLisaDays}</span>/${daysInMonth}d (${daysInMonth > 0 ? Math.round(mCraigDays/daysInMonth*100) : 0}%)</span>
          <span>💧${mWater}</span>
        </div>
      </div>
      <div style="font-size:18px;font-weight:800;color:${overallColor};min-width:44px;text-align:right">${overallPct}%</div>
    </div>`;

  document.getElementById('month-grid').innerHTML = html;

  // Legend
  document.getElementById('month-legend').innerHTML = `
    <div class="legend-item"><div class="legend-dot craig"></div>Craig (${mCraigDays}d)</div>
    <div class="legend-item"><div class="legend-dot lisa"></div>Lisa (${mLisaDays}d)</div>
    <div class="legend-item">🚣 Row · 🏋️ Gym · 🧘 Yoga · 😴 Rest</div>
    <div class="legend-item"><span style="color:var(--cyan)">▂</span> No school</div>
    <div class="legend-item"><span style="color:var(--red)">▂</span> Stat holiday</div>
  `;
}

// ── VIEW NAVIGATION ──
let currentView = 'daily'; // 'daily', 'week', 'month'

function updateNavButtons() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.remove('active');
    const text = btn.textContent.trim();
    if (text === 'Today' && currentView === 'daily' && currentDayOffset === 0) btn.classList.add('active');
    if (text === 'Week' && currentView === 'week' && currentWeekOffset === 0) btn.classList.add('active');
    if (text === 'Month' && currentView === 'month' && currentMonthOffset === 0) btn.classList.add('active');
  });
}

function switchView(id) {
  ['daily-view', 'week-view', 'month-view'].forEach(vid => {
    const el = document.getElementById(vid);
    if (vid === id) {
      el.classList.add('active');
      el.classList.remove('hidden');
    } else {
      el.classList.remove('active');
      el.classList.add('hidden');
    }
  });
  updateNavButtons();
}

function goToDay(offset) { currentView = 'daily'; currentDayOffset = offset; renderDaily(); switchView('daily-view'); updateNavButtons(); }
function showDailyView() { currentView = 'daily'; currentDayOffset = 0; renderDaily(); switchView('daily-view'); }
function showWeekView() { currentView = 'week'; currentWeekOffset = 0; renderWeek(); switchView('week-view'); }
function showMonthView() { currentView = 'month'; currentMonthOffset = 0; renderMonth(); switchView('month-view'); }
function changeDay(delta) { currentDayOffset += delta; renderDaily(); updateNavButtons(); }
function changeWeek(delta) { currentWeekOffset += delta; renderWeek(); updateNavButtons(); }
function changeMonth(delta) { currentMonthOffset += delta; renderMonth(); updateNavButtons(); }

// ── Refresh ──
async function refreshData(btn) {
  if (btn) { btn.classList.add('spinning'); }
  // Try Supabase first, then CSV, then fallback
  const dbLoaded = await loadScheduleFromDB();
  if (!dbLoaded) {
    await loadScheduleCSV();
  }
  if (Object.keys(CUSTODY_CALENDAR).length === 0) {
    CUSTODY_CALENDAR = {...FALLBACK_CUSTODY};
    Object.assign(CSV_EVENTS, FALLBACK_EVENTS);
    Object.assign(CSV_NOTES, FALLBACK_NOTES);
  }
  // Load tracking data for a wide range (current month ± 1)
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const end = new Date(now.getFullYear(), now.getMonth() + 2, 0);
  await loadTrackingData(ds(start), ds(end));

  if (currentView === 'daily') renderDaily();
  else if (currentView === 'week') renderWeek();
  else if (currentView === 'month') renderMonth();
  updateNavButtons();
  if (btn) { setTimeout(() => btn.classList.remove('spinning'), 600); }
}

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  initSupabase();

  // Check for existing session
  const loggedIn = await checkAuth();
  if (loggedIn) {
    document.getElementById('login-screen').classList.add('hidden');
    await startDashboard();
  }
  // If not logged in, login screen stays visible — doLogin() triggers startDashboard()

  // Auto-refresh every 5 minutes
  setInterval(() => refreshData(), 300000);
  // Update time display every 60 seconds (all views)
  function updateAllClocks() {
    const t = fmtTime(new Date());
    document.getElementById('time-display').textContent = t;
    document.getElementById('week-time-display').textContent = t;
    document.getElementById('month-time-display').textContent = t;
  }
  setInterval(() => { updateAllClocks(); renderDaily(); }, 60000);

  // Allow Enter key to submit login
  document.getElementById('login-password').addEventListener('keyup', (e) => {
    if (e.key === 'Enter') doLogin();
  });
});
</script>
